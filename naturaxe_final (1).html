// ── APP ──────────────────────────────────────────────────────────────────────
let aTag='all', selId=null, aTab=0;
const TLABS=['📋 Description','💊 Posologie','🩺 Maladies','🔗 Synergies','⚠️ Contre-ind.'];

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>`<button class="cb ${aTag===c.t?'on':''}" onclick="setTag('${c.t}')">${c.e} ${c.l}</button>`).join('');
}

function setTag(t){
  aTag=t;
  document.getElementById('srch').value='';
  selId=null;
  renderCats();renderGrid();
  document.getElementById('fz').innerHTML='';
}

function renderGrid(){
  const raw=document.getElementById('srch').value;
  const q=raw.toLowerCase().trim();
  const items=PRODS.filter(p=>{
    // Filtre catégorie (ignoré si recherche active)
    const okCat=q?true:(aTag==='all'||p.t===aTag);
    if(!okCat)return false;
    if(!q)return true;
    // Cherche dans : nom + catégorie + mots-clés dédiés
    const hay=(p.n+' '+p.c+' '+(p.k||'')).toLowerCase();
    return hay.includes(q);
  });
  document.getElementById('tn').textContent=PRODS.length;
  document.getElementById('cn').textContent=items.length+' produit'+(items.length>1?'s':'')+(q?' trouvé'+(items.length>1?'s':''):'');
  if(!items.length){
    document.getElementById('grid').innerHTML=`<div class="nores"><div class="ne">🔍</div><p>Aucun résultat pour "<strong>${raw}</strong>"<br>Essayez : miel, nigelle, diabète, stress, cheveux…</p></div>`;
    return;
  }
  document.getElementById('grid').innerHTML=items.map(p=>`
    <div class="card ${selId===p.id?'sel':''}" onclick="pick('${p.id}')">
      <span class="em">${p.e}</span>
      <div class="cn">${p.n}</div>
      <div class="cc">${p.c}</div>
      <span class="bdg ${p.b}">${p.c.split(/[&(]/)[0].trim().split(' ').slice(0,2).join(' ')}</span>
    </div>`).join('');
}

function pick(id){
  selId=id;aTab=0;renderGrid();renderFiche();
  setTimeout(()=>document.getElementById('fz').scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function renderFiche(){
  const p=PRODS.find(x=>x.id===selId);if(!p)return;

  const cont=[p.d,p.p,p.m,p.s,p.ci][aTab];
  const waM=encodeURIComponent('Bonjour, je suis intéressé par '+p.n+' — pouvez-vous me conseiller ?');
  document.getElementById('fz').innerHTML=`

      <div class="fh">

function switchTab(i){
  aTab=i;
  const p=PRODS.find(x=>x.id===selId);if(!p)return;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('on',idx===i));
  document.getElementById('fc').innerHTML=[p.d,p.p,p.m,p.s,p.ci][i];
  document.getElementById('fz').scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('srch').addEventListener('input',function(){
